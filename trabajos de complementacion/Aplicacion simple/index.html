<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lista de tareas</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h1>Ordena tus pendientes Facil y Rapido</h1>

<p>Administre sus actividades pendientes.</p>

</header>

<section class="contenedor">

<div class="tareas">

<h2>Tareas Pendientes</h2>

<div class="agregar">

<input
type="text"
id="tarea"
placeholder="Escriba una tarea">

<button onclick="agregarTarea()">

Agregar

</button>

</div>

<ol id="lista"></ol>

</div>

</section>

<section class="galeria">

<h2>Galería Responsive</h2>

<div class="imagenes">

<img src="https://mdbcdn.b-cdn.net/img/Photos/Horizontal/Nature/4-col/img%20(73).webp" alt="Foto 1">

<img src="https://mdbcdn.b-cdn.net/img/Photos/Vertical/mountain2.webp" alt="Foto 2">

<img src="https://mdbcdn.b-cdn.net/img/Photos/Thumbnails/Slides/2.webp" alt="Foto 3">

<img src="https://mdbcdn.b-cdn.net/img/Photos/Thumbnails/Slides/3.webp" alt="Foto 4">

<img src="https://mdbcdn.b-cdn.net/img/Photos/Thumbnails/Slides/4.webp" alt="Foto 5">

<img src="https://freefrontend.com/img/2025/2025-11-21-pure-html-css-image-slideshow_hu10776353844188818774.webp" alt="Foto 6">

</div>

</section>

<script src="js/script.js"></script>

</body>

</html>
