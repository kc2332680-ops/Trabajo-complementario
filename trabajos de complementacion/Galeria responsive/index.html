<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galería Responsive</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h1>Galería  Responsive</h1>

<p>Explora diferentes categorías de imágenes.</p>

</header>

<section class="filtros">

<button onclick="filtrar('todos')" class="activo">Todos</button>

<button onclick="filtrar('naturaleza')">Naturaleza</button>

<button onclick="filtrar('tecnologia')">Tecnología</button>

<button onclick="filtrar('ciudad')">Ciudad</button>

</section>

<section class="galeria">

<div class="card naturaleza">

<img src="https://www.ismedioambiente.com/wp-content/uploads/2022/02/parque-munich-1536x1025.jpg" alt="Naturaleza">

<div class="info">

<h3>Naturaleza</h3>

<p>Paisajes verdes y aire puro.</p>

</div>

</div>

<div class="card naturaleza">

<img src="https://tse1.mm.bing.net/th/id/OIP.gtUjloLm_QtSEY05jL7aFwHaEo?r=0&rs=1&pid=ImgDetMain&o=7&rm=3" alt="Naturaleza">

<div class="info">

<h3>Montañas</h3>

<p>Hermosos paisajes naturales.</p>

</div>

</div>

<div class="card tecnologia">

<img src="https://masiva.ec/wp-content/uploads/2021/05/drones.jpg" alt="Tecnología">

<div class="info">

<h3>Tecnología</h3>

<p>Innovación y desarrollo.</p>

</div>

</div>

<div class="card tecnologia">

<img src="https://media.biobiochile.cl/wp-content/uploads/2022/03/armado-pc-gamers-sp-digital.jpg" alt="Tecnología">

<div class="info">

<h3>Computación</h3>

<p>Equipos modernos.</p>

</div>

</div>

<div class="card ciudad">

<img src="https://i.pinimg.com/736x/f2/e2/fa/f2e2fa5295ca489ebd6e940fb2bef2c1.jpg" alt="Ciudad">

<div class="info">

<h3>Ciudad</h3>

<p>Arquitectura moderna.</p>

</div>

</div>

<div class="card ciudad">

<img src="https://planner5d.com/blog/content/images/2024/09/arquitectura.romana.4.jpg" alt="Ciudad">

<div class="info">

<h3>Urbanismo</h3>

<p>Grandes construcciones.</p>

</div>

</div>

</section>

<script src="js/script.js"></script>

</body>

</html>
